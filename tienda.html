<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tienda ENIGME</title>
  <meta name="theme-color" content="#FAF6F0"/>
  <link rel="icon" href="icon-192.svg" type="image/svg+xml"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;500&family=Jost:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#FAF6F0;color:#000;font-family:'Jost',sans-serif;font-weight:400;min-height:100vh;}
    a{color:#8B6914;text-decoration:none;}
    .topbar{position:sticky;top:0;z-index:50;padding:14px 24px;border-bottom:1px solid rgba(139,105,20,.15);background:rgba(250,246,240,.97);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .brand{font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.3em;color:#000;}
    .seller-info{font-size:.7rem;color:#000;text-align:right;}
    .seller-info strong{color:#8B6914;}
    .hero{text-align:center;padding:40px 20px 32px;}
    .hero h1{font-family:'Cinzel',serif;font-size:clamp(1.2rem,4vw,1.8rem);font-weight:300;letter-spacing:.12em;color:#000;margin-bottom:6px;}
    .hero p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:rgba(0,0,0,.5);}
    .disclaimer{max-width:700px;margin:0 auto 24px;padding:12px 20px;background:#fff;border-left:3px solid #8B6914;font-size:.72rem;color:#000;line-height:1.7;}
    .filters{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;padding:0 20px 24px;}
    .filter-btn{padding:8px 18px;border:1px solid rgba(139,105,20,.2);background:transparent;font-family:'Jost',sans-serif;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:rgba(0,0,0,.5);cursor:pointer;transition:all .2s;}
    .filter-btn.active,.filter-btn:hover{border-color:#8B6914;color:#8B6914;background:rgba(139,105,20,.05);}
    .grid{max-width:1100px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
    .card{background:#fff;border:1px solid rgba(139,105,20,.1);overflow:hidden;transition:box-shadow .3s;}
    .card:hover{box-shadow:0 4px 20px rgba(139,105,20,.1);}
    .card-img{width:100%;aspect-ratio:1;object-fit:contain;background:#fff;display:block;padding:8px;}
    .card-body{padding:16px;}
    .card-cat{font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:#8B6914;margin-bottom:6px;}
    .card-name{font-family:'Cinzel',serif;font-size:.85rem;font-weight:400;letter-spacing:.06em;color:#000;margin-bottom:4px;}
    .card-code{font-size:.6rem;color:rgba(0,0,0,.35);margin-bottom:8px;}
    .card-price{font-family:'Cinzel',serif;font-size:1.1rem;color:#8B6914;font-weight:500;margin-bottom:12px;}
    .btn-wa{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border:none;background:#25D366;color:#fff;font-family:'Jost',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:1px;cursor:pointer;transition:background .2s;}
    .btn-wa:hover{background:#1da851;}
    .btn-wa svg{width:18px;height:18px;fill:#fff;}
    .footer{text-align:center;padding:32px 20px;border-top:1px solid rgba(139,105,20,.1);}
    .footer .brand-f{font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.25em;color:#000;margin-bottom:6px;}
    .footer p{font-size:.65rem;color:rgba(0,0,0,.4);line-height:1.7;max-width:600px;margin:0 auto;}
    .loading{text-align:center;padding:80px 20px;font-size:.8rem;color:rgba(0,0,0,.4);}
    .error{text-align:center;padding:80px 20px;}
    .error h2{font-family:'Cinzel',serif;font-size:1.2rem;color:#000;margin-bottom:8px;}
    .error p{font-size:.85rem;color:rgba(0,0,0,.5);}
    .empty{text-align:center;padding:60px 20px;color:rgba(0,0,0,.4);font-size:.85rem;}
    @media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:12px;padding:0 12px 32px;}.card-body{padding:12px;}.card-name{font-size:.75rem;}.card-price{font-size:.95rem;}.topbar{padding:10px 14px;}.hero{padding:28px 16px 20px;}.hero h1{font-size:1.1rem;}}
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand">ENIGME</div>
  <div class="seller-info" id="sellerInfo">Cargando...</div>
</div>

<div id="mainContent">
  <div class="loading" id="loadingScreen">
    <p style="font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.2em;color:#8B6914;margin-bottom:8px;">ENIGME</p>
    <p>Cargando tienda...</p>
  </div>
</div>

<script>
var SB='https://hajmyntnvurlcuwshjdd.supabase.co/rest/v1/';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhham15bnRudnVybGN1d3NoamRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDM2MjEsImV4cCI6MjA4ODU3OTYyMX0.XGF5wPX1sI9VgG11bnr41lCxeqTfFVHEhBIfBXXYAkw';
var H={'apikey':SK,'Authorization':'Bearer '+SK};
var IMG_BASE='https://enigmeofficial.com/';
var vendedora=null, productos=[], filtro='todos';

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

async function init(){
  var code=getParam('c');
  if(!code){showError('Sin c\u00f3digo','Agrega ?c=TU_CODIGO a la URL');return;}
  try{
    // Load vendedora
    var r=await fetch(SB+'vendedoras?codigo=eq.'+encodeURIComponent(code)+'&select=*',{headers:H});
    var d=await r.json();
    if(!d.length){
      // Try from contratos
      var r2=await fetch(SB+'contratos_vendedoras?codigo_vendedora=eq.'+encodeURIComponent(code)+'&select=*',{headers:H});
      var d2=await r2.json();
      if(!d2.length){showError('Tienda no encontrada','El c\u00f3digo '+code+' no existe');return;}
      vendedora={nombre:d2[0].nombre_completo,telefono:d2[0].telefono,email:d2[0].email,codigo:d2[0].codigo_vendedora,zona_oro:d2[0].zona_oro};
    }else{
      vendedora={nombre:d[0].nombre,telefono:d[0].telefono,email:d[0].email,codigo:d[0].codigo,zona_oro:''};
    }
    // Load productos
    var rp=await fetch(SB+'catalogo_productos?activo=eq.true&select=*&order=categoria,nombre',{headers:H});
    productos=await rp.json();
    // Update title
    document.title='Tienda de '+vendedora.nombre+' \u2014 ENIGME';
    render();
  }catch(e){console.error(e);showError('Error','No se pudo cargar la tienda');}
}

function showError(title,msg){
  document.getElementById('mainContent').innerHTML='<div class="error"><h2>'+title+'</h2><p>'+msg+'</p></div>';
  document.getElementById('sellerInfo').textContent='';
}

function render(){
  var tel=vendedora.telefono||'';
  var waNum=tel.replace(/\D/g,'');
  if(waNum.length<=8)waNum='504'+waNum;
  document.getElementById('sellerInfo').innerHTML='Asesora: <strong>'+esc(vendedora.nombre)+'</strong><br>C\u00f3digo: '+esc(vendedora.codigo);
  var cats=[...new Set(productos.map(function(p){return p.categoria;}))].sort();
  var catLabels={'joyeria':'Joyer\u00eda','boutique':'Boutique','plata':'Plata 925','liquidacion':'Liquidaci\u00f3n','vestidos':'Vestidos'};
  var filterHtml='<button class="filter-btn active" onclick="setFilter(\'todos\',this)">Todos</button>';
  cats.forEach(function(c){filterHtml+='<button class="filter-btn" onclick="setFilter(\''+c+'\',this)">'+(catLabels[c]||c)+'</button>';});

  var html='<div class="hero"><h1>Tienda de '+esc(vendedora.nombre)+'</h1><p>Asesora Independiente ENIGME Honduras</p></div>';
  html+='<div class="disclaimer"><strong>Aviso Legal:</strong> Los productos exhibidos son de la marca ENIGME Honduras. La gesti\u00f3n fiscal, legal y comercial de esta tienda es responsabilidad exclusiva de la asesora independiente <strong>'+esc(vendedora.nombre)+'</strong>, quien opera como comerciante individual conforme al C\u00f3digo de Comercio de Honduras.</div>';
  html+='<div class="filters" id="filtersRow">'+filterHtml+'</div>';
  html+='<div class="grid" id="productsGrid"></div>';
  html+='<div class="footer"><div class="brand-f">ENIGME</div><p>\u00a9 2026 ENIGME Honduras. Productos de marca ENIGME comercializados por asesora independiente '+esc(vendedora.nombre)+'. La empresa ENIGME Honduras no se hace responsable de las transacciones individuales entre la asesora y sus clientes.</p></div>';
  document.getElementById('mainContent').innerHTML=html;
  renderProducts(waNum);
}

function setFilter(f,btn){
  filtro=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  var tel=vendedora.telefono||'';var waNum=tel.replace(/\D/g,'');if(waNum.length<=8)waNum='504'+waNum;
  renderProducts(waNum);
}

function renderProducts(waNum){
  var data=filtro==='todos'?productos:productos.filter(function(p){return p.categoria===filtro;});
  var grid=document.getElementById('productsGrid');
  if(!data.length){grid.innerHTML='<div class="empty">No hay productos en esta categor\u00eda</div>';return;}
  var catLabels={'joyeria':'Joyer\u00eda','boutique':'Boutique','plata':'Plata 925','liquidacion':'Liquidaci\u00f3n','vestidos':'Vestidos'};
  grid.innerHTML=data.map(function(p){
    var img=p.imagen?IMG_BASE+p.imagen:IMG_BASE+'logo.png';
    var precio='L '+Number(p.precio).toLocaleString('es-HN');
    var waMsg=encodeURIComponent('Hola '+vendedora.nombre+', me interesa el producto:\n\n*'+p.nombre+'*\nC\u00f3digo: '+p.codigo+'\nPrecio: '+precio+'\n\n\u00bfEst\u00e1 disponible?');
    return '<div class="card">'
      +'<img class="card-img" src="'+img+'" alt="'+esc(p.nombre)+'" onerror="this.src=\''+IMG_BASE+'logo.png\'"/>'
      +'<div class="card-body">'
      +'<div class="card-cat">'+(catLabels[p.categoria]||p.categoria)+'</div>'
      +'<div class="card-name">'+esc(p.nombre)+'</div>'
      +'<div class="card-code">Ref. '+esc(p.codigo)+'</div>'
      +'<div class="card-price">'+precio+'</div>'
      +'<a href="https://wa.me/'+waNum+'?text='+waMsg+'" target="_blank" class="btn-wa"><svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.625.846 5.059 2.284 7.034L.789 23.492a.5.5 0 00.611.611l4.458-1.495A11.943 11.943 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-2.34 0-4.508-.794-6.24-2.128l-.436-.344-3.202 1.073 1.073-3.202-.344-.436A9.956 9.956 0 012 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>Comprar por WhatsApp</a>'
      +'</div></div>';
  }).join('');
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

init();
</script>
</body>
</html>
