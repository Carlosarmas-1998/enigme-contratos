  <meta name="theme-color" content="#FAF6F0"/>
  <script>
  // Limpiar service worker y cache viejo que redirige
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(r){r.unregister();});
    });
    caches.keys().then(function(names){
      names.forEach(function(n){caches.delete(n);});
    });
  }
  </script>
  <link rel="manifest" href="manifest.json"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#FAF6F0;color:#000;font-family:'Jost',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}

    .sub{font-size:.6rem;letter-spacing:4px;color:#8B6914;text-transform:uppercase;margin-bottom:40px;}
    .links{display:flex;flex-direction:column;gap:16px;}
    .link-btn{display:block;padding:18px 24px;border:1px solid rgba(139,105,20,.2);background:#fff;text-decoration:none;color:#000;font-family:'Jost',sans-serif;font-size:.85rem;letter-spacing:1px;transition:all .2s;}
    .link-btn:hover{border-color:#8B6914;background:rgba(139,105,20,.04);}
    .link-btn strong{display:block;font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:3px;text-transform:uppercase;color:#8B6914;margin-bottom:6px;}
    .link-btn span{font-size:.75rem;color:rgba(0,0,0,.5);}
    .footer{margin-top:40px;font-size:.55rem;color:rgba(0,0,0,.3);letter-spacing:1px;}
  </style>
</head>
